<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taska</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div class="titlebar" data-tauri-drag-region>
      <span class="titlebar-brand" data-tauri-drag-region>Taska · tauri 2.x</span>
      <div class="titlebar-right">
        <button id="theme-btn" class="theme-btn">◐ light</button>
        <span class="win-dots">
          <span class="dot dot-min"   id="win-min"   title="Minimize"></span>
          <span class="dot dot-max"   id="win-max"   title="Maximize"></span>
          <span class="dot dot-close" id="win-close" title="Close"></span>
        </span>
      </div>
    </div>

    <div class="layout">
      <nav class="sidebar">
        <div class="brand">
          <span class="brand-mark">T</span>
          <span class="brand-name">Taska</span>
          <span class="brand-ver">0.1.0</span>
        </div>
        <ul class="nav-list">
          <li class="nav-item active" data-goto="myday">
            <span class="nav-icon">◉</span>
            <span class="nav-label">My Day</span>
            <span class="nav-pill" id="cnt-myday"></span>
          </li>
          <li class="nav-item" data-goto="tasks">
            <span class="nav-icon">☰</span>
            <span class="nav-label">Tasks</span>
            <span class="nav-pill" id="cnt-tasks"></span>
          </li>
          <li class="nav-item" data-goto="templates">
            <span class="nav-icon">⑂</span>
            <span class="nav-label">Templates</span>
            <span class="nav-pill" id="cnt-templates"></span>
          </li>
          <li class="nav-item" data-goto="daily">
            <span class="nav-icon">▦</span>
            <span class="nav-label">Daily</span>
            <span class="nav-pill" id="cnt-daily"></span>
          </li>
        </ul>
        <div class="sidebar-foot">
          <button id="sim-reset" class="dev-btn">↻ Simulate daily-reset</button>
        </div>
      </nav>

      <main class="content">

        <!-- ── My Day ─────────────────────────────────────── -->
        <section data-view="myday" class="view active">
          <div class="view-head">
            <div class="view-head-title">
              <h1>My Day</h1>
              <div class="myday-date-nav">
                <button id="myday-prev-btn" class="btn ghost icon-btn" title="Yesterday">‹</button>
                <p id="today-date-sub" class="view-sub"></p>
                <button id="myday-next-btn" class="btn ghost icon-btn" title="Back to today" style="display:none">›</button>
              </div>
            </div>
            <span id="autosave-hint" class="autosave-hint"></span>
            <button id="from-template-btn" class="btn ghost">⑂ From template</button>
          <button id="new-task-btn" class="btn">+ New <kbd>N</kbd></button>
          </div>
          <div class="panel">
            <div class="chip-bar">
              <button class="chip active" data-f="all">all</button>
              <button class="chip" data-f="personal"><span class="ctx-dot personal"></span>personal</button>
              <button class="chip" data-f="work"><span class="ctx-dot work"></span>work</button>
            </div>
            <div id="myday-meta" class="myday-meta"></div>
            <div id="myday-list" class="myday-list"></div>
          </div>
        </section>

        <!-- ── Tasks ──────────────────────────────────────── -->
        <section data-view="tasks" class="view">
          <div class="view-head">
            <div class="view-head-title"><h1>Tasks</h1></div>
            <input id="task-search" type="search" class="search-input" placeholder="⌕  search…" autocomplete="off" />
            <div class="seg-filter" id="task-filter">
              <button class="seg active" data-filter="active">active</button>
              <button class="seg" data-filter="archived">archived</button>
            </div>
            <button id="new-task-tasks-btn" class="btn">+ New <kbd>N</kbd></button>
          </div>
          <div class="panel tasks-panel">
            <div class="col-head">
              <span></span>
              <span>Task</span>
              <span>Tags</span>
              <span>Due</span>
            </div>
            <div id="tasks-list" class="tasks-list"></div>
          </div>
        </section>

        <!-- ── Templates ──────────────────────────────────── -->
        <section data-view="templates" class="view">
          <div class="view-head">
            <div class="view-head-title">
              <h1>Templates</h1>
              <p class="view-sub">reusable task blueprints</p>
            </div>
          </div>
          <div class="panel">
            <div id="templates-list" class="templates-list"></div>
          </div>
        </section>

        <!-- ── Daily ──────────────────────────────────────── -->
        <section data-view="daily" class="view">
          <div class="view-head">
            <div class="view-head-title">
              <h1>Daily</h1>
              <p class="view-sub">completion heatmap</p>
            </div>
          </div>
          <div class="panel daily-panel">
            <div class="stat-tiles">
              <div class="stat-tile">
                <span class="stat-value" id="stat-today-done">—</span>
                <span class="stat-label">today done</span>
              </div>
              <div class="stat-tile">
                <span class="stat-value stat-green" id="stat-rate">—</span>
                <span class="stat-label">today rate</span>
              </div>
              <div class="stat-tile">
                <span class="stat-value" id="stat-streak">—</span>
                <span class="stat-label">best streak</span>
              </div>
            </div>
            <div class="heat-wrap">
              <div id="heatmap"></div>
            </div>
            <div class="heat-legend">
              <span class="heat-legend-text">less</span>
              <span class="heat-legend-cell" data-lvl="0"></span>
              <span class="heat-legend-cell" data-lvl="1"></span>
              <span class="heat-legend-cell" data-lvl="2"></span>
              <span class="heat-legend-cell" data-lvl="3"></span>
              <span class="heat-legend-cell" data-lvl="4"></span>
              <span class="heat-legend-text">more</span>
            </div>
          </div>
        </section>

      </main>
    </div>

    <!-- Daily reset banner -->
    <div id="reset-banner" class="reset-banner hidden">
      <span>↻ Daily reset · new instances created</span>
      <button id="dismiss-reset" class="banner-dismiss">×</button>
    </div>

    <!-- ── Unified modal ──────────────────────────────────── -->
    <div id="modal-scrim" class="modal-scrim hidden">
      <div class="modal-card" id="modal-card" data-mode="create">
        <div class="modal-head">
          <span id="modal-title" class="modal-title-text">Create task</span>
          <span id="modal-mode-tag" class="mode-tag">CREATE</span>
          <button id="modal-close" class="modal-close-btn">×</button>
        </div>
        <div class="modal-body">

          <!-- Spawn-only: template picker -->
          <div class="spawn-only modal-field">
            <label class="field-label" for="spawn-template-select">Template</label>
            <select id="spawn-template-select" class="modal-select"></select>
          </div>

          <!-- Title: all modes -->
          <input id="m-title" type="text" class="modal-input" placeholder="Task title" autocomplete="off" />

          <!-- Context (all modes) + Category (create-only) -->
          <div class="modal-row">
            <div class="choice-group" data-group="context">
              <button class="choice active" data-v="personal">personal</button>
              <button class="choice" data-v="work">work</button>
            </div>
            <div class="choice-group no-spawn" data-group="category">
              <button class="choice active" data-v="daily">daily</button>
              <button class="choice" data-v="normal">normal</button>
            </div>
          </div>

          <!-- Due + Status (edit-only) -->
          <div class="modal-row">
            <div id="due-wrapper" style="display:flex; gap:10px; flex:1; align-items:center">
              <div class="choice-group create-only" data-group="due-mode">
                <button class="choice active" data-v="today">today</button>
                <button class="choice" data-v="custom">custom</button>
              </div>
              <input id="m-due" type="date" class="modal-input modal-due" />
            </div>
            <div class="choice-group edit-only" data-group="status">
              <button class="choice active" data-v="active">active</button>
              <button class="choice" data-v="archived">archived</button>
            </div>
          </div>

          <!-- Note: all modes -->
          <textarea id="m-note" class="modal-textarea" placeholder="Note… (supports markdown)" rows="5"></textarea>

          <!-- Template toggle: create + edit -->
          <label class="switch-row no-spawn">
            <span class="switch-label">Is template</span>
            <input id="m-template" type="checkbox" class="switch-input" />
            <span class="switch-hint">save as reusable blueprint in Templates</span>
          </label>

        </div>
        <div class="modal-foot">
          <button id="modal-cancel" class="btn ghost">Cancel <kbd>Esc</kbd></button>
          <button id="modal-save"   class="btn primary">Save</button>
        </div>
      </div>
    </div>
  </body>
</html>
